project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "posts/*.qmd"
    - "posts/*.md"
    - "!posts/2022-05-25-notes-model-based-epistemology-measurement.qmd"
    - "!posts/2023-05-21-julia.qmd"

website:
  title: "Ecology, Society, Democracy"
  site-url: https://ecosocdem.github.io

  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: quotes.qmd
        text: Quotes
    right:
      - icon: twitter
        href: https://twitter.com/BradVenner
      - icon: github
        href: https://github.com/bvenner

  page-footer:
    center: "Copyright 2016-2025, Brad Venner"

format:
  html:
    theme: cosmo
    toc: true

execute:
  freeze: auto
